name: Publish frontend image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional image tag. Defaults to short commit SHA.
        required: false
        type: string
      publish_latest:
        description: Also publish the latest tag.
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image tags
        id: image
        shell: bash
        env:
          CUSTOM_TAG: ${{ inputs.tag }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          image="$(printf 'ghcr.io/%s-frontend' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"
          tag="$CUSTOM_TAG"
          if [ -z "$tag" ]; then
            tag="sha-${short_sha}"
          fi

          {
            echo "name=${image}"
            echo "tags<<EOF"
            echo "${image}:${tag}"
            if [ "$PUBLISH_LATEST" = "true" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=geopanel-frontend
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Published image
        run: |
          echo "Published:"
          echo "${{ steps.image.outputs.tags }}"
